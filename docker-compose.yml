services:
  bot:
    build:
      context: .
    image: my-tg-bot:latest
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}

  mongo:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongo-db:/data/db
      - mongo-config:/data/configdb

volumes:
  mongo-db:
  mongo-config:
